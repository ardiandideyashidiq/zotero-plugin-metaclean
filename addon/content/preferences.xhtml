<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <!-- General Settings -->
  <html:h2 data-l10n-id="pref-title"></html:h2>

  <groupbox>
    <caption>
      <label data-l10n-id="pref-general"></label>
    </caption>
    <checkbox
      id="zotero-prefpane-__addonRef__-enabled"
      preference="enabled"
      data-l10n-id="pref-enable"
    />
    <checkbox
      id="zotero-prefpane-__addonRef__-autoProcessNewItems"
      preference="autoProcessNewItems"
      data-l10n-id="pref-auto-process"
    />
    <checkbox
      id="zotero-prefpane-__addonRef__-previewBeforeApply"
      preference="previewBeforeApply"
      data-l10n-id="pref-preview"
    />
  </groupbox>

  <!-- Field Groups -->
  <groupbox>
    <caption>
      <label data-l10n-id="pref-field-groups"></label>
    </caption>
    <checkbox
      id="zotero-prefpane-__addonRef__-processTitles"
      preference="processTitles"
      data-l10n-id="pref-process-titles"
    />
    <checkbox
      id="zotero-prefpane-__addonRef__-processPublications"
      preference="processPublications"
      data-l10n-id="pref-process-publications"
    />
    <checkbox
      id="zotero-prefpane-__addonRef__-processPublishers"
      preference="processPublishers"
      data-l10n-id="pref-process-publishers"
    />
    <checkbox
      id="zotero-prefpane-__addonRef__-processPlaces"
      preference="processPlaces"
      data-l10n-id="pref-process-places"
    />
    <checkbox
      id="zotero-prefpane-__addonRef__-processCreators"
      preference="processCreators"
      data-l10n-id="pref-process-creators"
    />
    <checkbox
      id="zotero-prefpane-__addonRef__-processIdentifiers"
      preference="processIdentifiers"
      data-l10n-id="pref-process-identifiers"
    />
  </groupbox>

  <!-- Casing Modes -->
  <groupbox>
    <caption>
      <label data-l10n-id="pref-casing"></label>
    </caption>
    <hbox>
      <label
        for="zotero-prefpane-__addonRef__-defaultTitleMode"
        data-l10n-id="pref-title-mode"
        style="width: 200px"
      ></label>
      <menulist
        id="zotero-prefpane-__addonRef__-defaultTitleMode"
        preference="defaultTitleMode"
      >
        <menupopup>
          <menuitem value="sentence" label="Sentence case" />
          <menuitem value="title" label="Title Case" />
          <menuitem value="lower" label="lowercase" />
          <menuitem value="upper" label="UPPERCASE" />
        </menupopup>
      </menulist>
    </hbox>
    <hbox>
      <label
        for="zotero-prefpane-__addonRef__-defaultPublicationMode"
        data-l10n-id="pref-publication-mode"
        style="width: 200px"
      ></label>
      <menulist
        id="zotero-prefpane-__addonRef__-defaultPublicationMode"
        preference="defaultPublicationMode"
      >
        <menupopup>
          <menuitem value="title" label="Title Case" />
          <menuitem value="sentence" label="Sentence case" />
          <menuitem value="lower" label="lowercase" />
          <menuitem value="upper" label="UPPERCASE" />
        </menupopup>
      </menulist>
    </hbox>
    <hbox>
      <label
        for="zotero-prefpane-__addonRef__-defaultPublisherMode"
        data-l10n-id="pref-publisher-mode"
        style="width: 200px"
      ></label>
      <menulist
        id="zotero-prefpane-__addonRef__-defaultPublisherMode"
        preference="defaultPublisherMode"
      >
        <menupopup>
          <menuitem value="title" label="Title Case" />
          <menuitem value="sentence" label="Sentence case" />
          <menuitem value="lower" label="lowercase" />
          <menuitem value="upper" label="UPPERCASE" />
        </menupopup>
      </menulist>
    </hbox>
    <hbox>
      <label
        for="zotero-prefpane-__addonRef__-defaultCreatorMode"
        data-l10n-id="pref-creator-mode"
        style="width: 200px"
      ></label>
      <menulist
        id="zotero-prefpane-__addonRef__-defaultCreatorMode"
        preference="defaultCreatorMode"
      >
        <menupopup>
          <menuitem value="name" label="Name case" />
          <menuitem value="title" label="Title-like case" />
          <menuitem value="lower" label="lowercase" />
          <menuitem value="upper" label="UPPERCASE" />
        </menupopup>
      </menulist>
    </hbox>
  </groupbox>

  <!-- Safety -->
  <groupbox>
    <caption>
      <label data-l10n-id="pref-safety"></label>
    </caption>
    <hbox>
      <label
        for="zotero-prefpane-__addonRef__-addTagAfterProcessing"
        data-l10n-id="pref-add-tag"
        style="width: 200px"
      ></label>
      <html:input
        type="text"
        id="zotero-prefpane-__addonRef__-addTagAfterProcessing"
        preference="addTagAfterProcessing"
      ></html:input>
    </hbox>
    <hbox>
      <label
        for="zotero-prefpane-__addonRef__-skipTag"
        data-l10n-id="pref-skip-tag"
        style="width: 200px"
      ></label>
      <html:input
        type="text"
        id="zotero-prefpane-__addonRef__-skipTag"
        preference="skipTag"
      ></html:input>
    </hbox>
    <hbox align="start">
      <label
        for="zotero-prefpane-__addonRef__-exceptionWords"
        data-l10n-id="pref-exception-words"
        style="width: 200px"
      ></label>
      <html:textarea
        id="zotero-prefpane-__addonRef__-exceptionWords"
        preference="exceptionWords"
        rows="4"
        style="min-width: 300px"
      ></html:textarea>
    </hbox>
  </groupbox>
</groupbox>
<vbox>
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>
